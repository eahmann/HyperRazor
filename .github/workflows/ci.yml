name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

defaults:
  run:
    shell: bash

jobs:
  package-story:
    name: Package Story Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check package story messaging
        run: ./scripts/check-package-story.sh

  fast-tests:
    name: Fast Tests / ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: package-story
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Htmx
            project: tests/HyperRazor.Htmx.Tests/HyperRazor.Htmx.Tests.csproj
          - name: Htmx.Core
            project: tests/HyperRazor.Htmx.Core.Tests/HyperRazor.Htmx.Core.Tests.csproj
          - name: Rendering
            project: tests/HyperRazor.Rendering.Tests/HyperRazor.Rendering.Tests.csproj
          - name: Demo.Mvc
            project: tests/HyperRazor.Demo.Mvc.Tests/HyperRazor.Demo.Mvc.Tests.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            HyperRazor.slnx
            src/**/*.csproj
            tests/**/*.csproj

      - name: Restore
        run: dotnet restore HyperRazor.slnx

      - name: Test ${{ matrix.name }}
        run: dotnet test ${{ matrix.project }} --configuration Release --no-restore --nologo --verbosity minimal
